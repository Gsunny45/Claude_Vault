# ═══════════════════════════════════════════════════════════════════════════════
# HERMETIC OS DESIGN SYSTEM — Master Token Architecture
# ═══════════════════════════════════════════════════════════════════════════════
# Single source of truth. All platform targets (Compose, Snygg, Obsidian CSS)
# are auto-generated from this file via sync-tokens.py.
#
# Aesthetic: Cyber-mystic / Arcane
# Philosophy: "Power user light with options."
# ═══════════════════════════════════════════════════════════════════════════════

meta:
  name: "Hermetic OS"
  version: "1.0.0"
  description: "Cyber-mystic design system for the Hermetic ecosystem"
  targets:
    - android-compose
    - snygg-keyboard
    - obsidian-css
  generated_by: "sync-tokens.py"

# ─────────────────────────────────────────────────────────────────────────────
# PRIMITIVE COLORS — Raw palette. Never reference directly in components.
# ─────────────────────────────────────────────────────────────────────────────
color:
  primitive:
    void:
      "950": "#080808"
      "900": "#0D0D0F"
      "850": "#111114"
      "800": "#16161A"
      "750": "#1C1C22"
      "700": "#22222A"
      "650": "#282832"
      "600": "#2E2E38"
      "550": "#353542"
      "500": "#3A3A46"
      "450": "#44444F"
      "400": "#4E4E5C"
      "350": "#5C5C6B"
      "300": "#6A6A7A"
      "250": "#7C7C8C"
      "200": "#8E8E9E"
      "150": "#A1A1B0"
      "100": "#B4B4C2"
      "50":  "#DCDCE6"

    violet:
      "950": "#1A1540"
      "900": "#2D2466"
      "850": "#352C78"
      "800": "#42358C"
      "750": "#4E40A0"
      "700": "#5A4CB3"
      "650": "#6758C6"
      "600": "#7464D9"
      "550": "#8070EC"
      "500": "#8C7BFF"
      "450": "#9788FF"
      "400": "#A296FF"
      "350": "#ADA4FF"
      "300": "#B8B0FF"
      "250": "#C3BDFF"
      "200": "#CEC9FF"
      "150": "#D9D5FF"
      "100": "#E4E1FF"
      "50":  "#F2F0FF"

    sky:
      "950": "#0A2A3D"
      "900": "#0F3752"
      "850": "#134466"
      "800": "#1D5E8C"
      "750": "#2268A0"
      "700": "#2878B3"
      "650": "#3189C6"
      "600": "#3A9AD9"
      "550": "#46B1EC"
      "500": "#52C7FF"
      "450": "#63CDFF"
      "400": "#74D4FF"
      "350": "#85DAFF"
      "300": "#96E0FF"
      "250": "#A7E6FF"
      "200": "#B8EBFF"
      "150": "#C9F0FF"
      "100": "#DAF5FF"
      "50":  "#EDFAFF"

    amber:
      "950": "#2E2510"
      "900": "#3E3115"
      "850": "#4D3D1A"
      "800": "#6B5524"
      "750": "#7A622C"
      "700": "#8A6E2E"
      "650": "#9A8038"
      "600": "#AB9144"
      "550": "#BEA251"
      "500": "#D2B35E"
      "450": "#D7BC6E"
      "400": "#DCCA7E"
      "350": "#E0D18E"
      "300": "#E5D99E"
      "250": "#EAE0AE"
      "200": "#EEE7BE"
      "150": "#F2EDCE"
      "100": "#F6F2DE"
      "50":  "#FBF9EF"

    # Status colors — fixed, not scaled
    status:
      success: "#4ADE80"
      success_dim: "#166534"
      error: "#F87171"
      error_dim: "#7F1D1D"
      warning: "#FBBF24"
      warning_dim: "#78350F"
      info: "#52C7FF"
      info_dim: "#0A2A3D"

    # Pure reference
    pure:
      white: "#FFFFFF"
      black: "#000000"
      transparent: "transparent"

  # ───────────────────────────────────────────────────────────────────────────
  # SEMANTIC COLORS — The public API. All components reference these.
  # ───────────────────────────────────────────────────────────────────────────
  semantic:
    # Surface hierarchy (layered depth model)
    surface:
      base:       "{color.primitive.void.950}"      # #080808 — app background
      raised:     "{color.primitive.void.900}"      # #0D0D0F — cards, panels
      elevated:   "{color.primitive.void.800}"      # #16161A — modals, popovers
      overlay:    "{color.primitive.void.750}"      # #1C1C22 — dropdowns, tooltips
      sunken:     "{color.primitive.void.950}"      # #080808 — inset areas, wells
      scrim:      "rgba(8, 8, 8, 0.72)"             # backdrop behind modals

    # Primary action family (Violet)
    primary:
      default:    "{color.primitive.violet.500}"    # #8C7BFF
      hover:      "{color.primitive.violet.400}"    # #A296FF
      pressed:    "{color.primitive.violet.600}"    # #7464D9
      disabled:   "{color.primitive.violet.800}"    # #42358C
      subtle:     "{color.primitive.violet.900}"    # #2D2466
      on_primary: "{color.primitive.void.950}"      # #080808 — text on primary bg

    # Secondary action family (Sky-Blue)
    secondary:
      default:    "{color.primitive.sky.500}"       # #52C7FF
      hover:      "{color.primitive.sky.400}"       # #74D4FF
      pressed:    "{color.primitive.sky.600}"       # #3A9AD9
      disabled:   "{color.primitive.sky.800}"       # #1D5E8C
      subtle:     "{color.primitive.sky.900}"       # #0F3752
      on_secondary: "{color.primitive.void.950}"    # #080808

    # Accent family (Amber)
    accent:
      default:    "{color.primitive.amber.500}"     # #D2B35E
      hover:      "{color.primitive.amber.400}"     # #DCCA7E
      pressed:    "{color.primitive.amber.600}"     # #AB9144
      disabled:   "{color.primitive.amber.800}"     # #6B5524
      subtle:     "{color.primitive.amber.900}"     # #3E3115
      on_accent:  "{color.primitive.void.950}"      # #080808

    # Text hierarchy
    text:
      primary:    "{color.primitive.void.50}"       # #DCDCE6
      secondary:  "{color.primitive.void.200}"      # #8E8E9E
      muted:      "{color.primitive.void.300}"      # #6A6A7A
      disabled:   "{color.primitive.void.400}"      # #4E4E5C
      inverse:    "{color.primitive.void.950}"      # #080808
      link:       "{color.primitive.violet.500}"    # #8C7BFF
      link_hover: "{color.primitive.violet.400}"    # #A296FF

    # Border hierarchy
    border:
      default:    "{color.primitive.void.700}"      # #22222A
      subtle:     "{color.primitive.void.800}"      # #16161A
      strong:     "{color.primitive.void.500}"      # #3A3A46
      focus:      "{color.primitive.violet.500}"    # #8C7BFF
      error:      "{color.primitive.status.error}"  # #F87171

    # State indicators
    state:
      success:    "{color.primitive.status.success}"
      success_bg: "{color.primitive.status.success_dim}"
      error:      "{color.primitive.status.error}"
      error_bg:   "{color.primitive.status.error_dim}"
      warning:    "{color.primitive.status.warning}"
      warning_bg: "{color.primitive.status.warning_dim}"
      info:       "{color.primitive.status.info}"
      info_bg:    "{color.primitive.status.info_dim}"

    # Interactive states
    interactive:
      hover_overlay:   "rgba(140, 123, 255, 0.08)"
      pressed_overlay: "rgba(140, 123, 255, 0.16)"
      focus_ring:      "rgba(140, 123, 255, 0.48)"
      selected_bg:     "rgba(140, 123, 255, 0.12)"
      drag_ghost:      "rgba(8, 8, 8, 0.64)"

# ─────────────────────────────────────────────────────────────────────────────
# TYPOGRAPHY — Scale, weights, families
# ─────────────────────────────────────────────────────────────────────────────
typography:
  family:
    display:  "'JetBrains Mono', 'Fira Code', 'Cascadia Code', monospace"
    body:     "'Inter', 'SF Pro', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif"
    code:     "'JetBrains Mono', 'Fira Code', 'Cascadia Code', monospace"
    keyboard: "'Inter', 'Roboto', sans-serif"

  # Modular scale: 1.200 (minor third), base 14px
  # High visual density = smaller base than typical 16px
  scale:
    "2xs":
      size: "10px"
      line_height: "14px"
      letter_spacing: "0.04em"
    xs:
      size: "11px"
      line_height: "16px"
      letter_spacing: "0.02em"
    sm:
      size: "12px"
      line_height: "18px"
      letter_spacing: "0.01em"
    base:
      size: "14px"
      line_height: "22px"
      letter_spacing: "0"
    md:
      size: "16px"
      line_height: "24px"
      letter_spacing: "-0.01em"
    lg:
      size: "18px"
      line_height: "28px"
      letter_spacing: "-0.015em"
    xl:
      size: "22px"
      line_height: "32px"
      letter_spacing: "-0.02em"
    "2xl":
      size: "28px"
      line_height: "36px"
      letter_spacing: "-0.025em"
    "3xl":
      size: "36px"
      line_height: "44px"
      letter_spacing: "-0.03em"
    "4xl":
      size: "48px"
      line_height: "56px"
      letter_spacing: "-0.035em"

  weight:
    thin: 100
    light: 300
    regular: 400
    medium: 500
    semibold: 600
    bold: 700
    black: 900

  # Composite text styles (semantic)
  styles:
    display_large:
      family: "{typography.family.display}"
      size: "{typography.scale.4xl.size}"
      line_height: "{typography.scale.4xl.line_height}"
      weight: "{typography.weight.bold}"
      letter_spacing: "{typography.scale.4xl.letter_spacing}"

    display_medium:
      family: "{typography.family.display}"
      size: "{typography.scale.3xl.size}"
      line_height: "{typography.scale.3xl.line_height}"
      weight: "{typography.weight.bold}"
      letter_spacing: "{typography.scale.3xl.letter_spacing}"

    heading_1:
      family: "{typography.family.display}"
      size: "{typography.scale.2xl.size}"
      line_height: "{typography.scale.2xl.line_height}"
      weight: "{typography.weight.semibold}"
      letter_spacing: "{typography.scale.2xl.letter_spacing}"

    heading_2:
      family: "{typography.family.display}"
      size: "{typography.scale.xl.size}"
      line_height: "{typography.scale.xl.line_height}"
      weight: "{typography.weight.semibold}"
      letter_spacing: "{typography.scale.xl.letter_spacing}"

    heading_3:
      family: "{typography.family.body}"
      size: "{typography.scale.lg.size}"
      line_height: "{typography.scale.lg.line_height}"
      weight: "{typography.weight.semibold}"
      letter_spacing: "{typography.scale.lg.letter_spacing}"

    body_large:
      family: "{typography.family.body}"
      size: "{typography.scale.md.size}"
      line_height: "{typography.scale.md.line_height}"
      weight: "{typography.weight.regular}"
      letter_spacing: "{typography.scale.md.letter_spacing}"

    body_default:
      family: "{typography.family.body}"
      size: "{typography.scale.base.size}"
      line_height: "{typography.scale.base.line_height}"
      weight: "{typography.weight.regular}"
      letter_spacing: "{typography.scale.base.letter_spacing}"

    body_small:
      family: "{typography.family.body}"
      size: "{typography.scale.sm.size}"
      line_height: "{typography.scale.sm.line_height}"
      weight: "{typography.weight.regular}"
      letter_spacing: "{typography.scale.sm.letter_spacing}"

    caption:
      family: "{typography.family.body}"
      size: "{typography.scale.xs.size}"
      line_height: "{typography.scale.xs.line_height}"
      weight: "{typography.weight.medium}"
      letter_spacing: "{typography.scale.xs.letter_spacing}"

    overline:
      family: "{typography.family.display}"
      size: "{typography.scale.2xs.size}"
      line_height: "{typography.scale.2xs.line_height}"
      weight: "{typography.weight.bold}"
      letter_spacing: "0.1em"
      text_transform: "uppercase"

    code_block:
      family: "{typography.family.code}"
      size: "{typography.scale.sm.size}"
      line_height: "20px"
      weight: "{typography.weight.regular}"
      letter_spacing: "0"

    code_inline:
      family: "{typography.family.code}"
      size: "{typography.scale.xs.size}"
      line_height: "{typography.scale.xs.line_height}"
      weight: "{typography.weight.medium}"
      letter_spacing: "0"

    key_label:
      family: "{typography.family.keyboard}"
      size: "{typography.scale.md.size}"
      line_height: "{typography.scale.md.line_height}"
      weight: "{typography.weight.medium}"
      letter_spacing: "0.02em"

    key_label_small:
      family: "{typography.family.keyboard}"
      size: "{typography.scale.xs.size}"
      line_height: "{typography.scale.xs.line_height}"
      weight: "{typography.weight.medium}"
      letter_spacing: "0.04em"

# ─────────────────────────────────────────────────────────────────────────────
# SPACING — 4px grid, named stops
# ─────────────────────────────────────────────────────────────────────────────
spacing:
  "0":   "0px"
  "0.5": "2px"
  "1":   "4px"
  "1.5": "6px"
  "2":   "8px"
  "2.5": "10px"
  "3":   "12px"
  "4":   "16px"
  "5":   "20px"
  "6":   "24px"
  "7":   "28px"
  "8":   "32px"
  "10":  "40px"
  "12":  "48px"
  "14":  "56px"
  "16":  "64px"
  "20":  "80px"
  "24":  "96px"
  "32":  "128px"

  # Semantic spacing aliases
  panel_padding:   "16px"    # spacing.4
  card_padding:    "12px"    # spacing.3
  card_gap:        "8px"     # spacing.2
  section_gap:     "24px"    # spacing.6
  inline_gap:      "8px"     # spacing.2
  stack_gap:       "4px"     # spacing.1
  page_margin:     "24px"    # spacing.6
  dense_padding:   "8px"     # spacing.2
  key_gap:         "4px"     # spacing.1  — keyboard key spacing
  key_padding_h:   "6px"     # spacing.1.5
  key_padding_v:   "10px"    # spacing.2.5

# ─────────────────────────────────────────────────────────────────────────────
# BORDER RADIUS
# ─────────────────────────────────────────────────────────────────────────────
radius:
  none:  "0px"
  xs:    "2px"
  sm:    "4px"
  md:    "8px"
  lg:    "12px"
  xl:    "16px"
  "2xl": "24px"
  full:  "9999px"

  # Semantic
  button:      "8px"      # radius.md
  card:        "12px"     # radius.lg
  panel:       "12px"     # radius.lg
  input:       "8px"      # radius.md
  badge:       "9999px"   # radius.full
  tooltip:     "8px"      # radius.md
  modal:       "16px"     # radius.xl
  key:         "8px"      # radius.md  — keyboard keys

# ─────────────────────────────────────────────────────────────────────────────
# ELEVATION — Shadow system
# ─────────────────────────────────────────────────────────────────────────────
elevation:
  "0": "none"
  "1": "0 1px 2px 0 rgba(0, 0, 0, 0.40)"
  "2": "0 2px 4px -1px rgba(0, 0, 0, 0.45), 0 1px 2px -1px rgba(0, 0, 0, 0.30)"
  "3": "0 4px 12px -2px rgba(0, 0, 0, 0.50), 0 2px 4px -2px rgba(0, 0, 0, 0.35)"
  "4": "0 8px 24px -4px rgba(0, 0, 0, 0.55), 0 4px 8px -4px rgba(0, 0, 0, 0.40)"
  "5": "0 16px 48px -8px rgba(0, 0, 0, 0.60), 0 8px 16px -8px rgba(0, 0, 0, 0.45)"

  # Semantic elevation
  card:    "0 2px 4px -1px rgba(0, 0, 0, 0.45), 0 1px 2px -1px rgba(0, 0, 0, 0.30)"     # elevation.2
  panel:   "0 4px 12px -2px rgba(0, 0, 0, 0.50), 0 2px 4px -2px rgba(0, 0, 0, 0.35)"    # elevation.3
  modal:   "0 16px 48px -8px rgba(0, 0, 0, 0.60), 0 8px 16px -8px rgba(0, 0, 0, 0.45)"  # elevation.5
  dropdown: "0 8px 24px -4px rgba(0, 0, 0, 0.55), 0 4px 8px -4px rgba(0, 0, 0, 0.40)"   # elevation.4
  tooltip: "0 4px 12px -2px rgba(0, 0, 0, 0.50), 0 2px 4px -2px rgba(0, 0, 0, 0.35)"    # elevation.3

# ─────────────────────────────────────────────────────────────────────────────
# GLOW — The arcane luminescence system
# ─────────────────────────────────────────────────────────────────────────────
glow:
  # Intensity levels per color
  violet:
    subtle:  "0 0 6px rgba(140, 123, 255, 0.15)"
    default: "0 0 12px rgba(140, 123, 255, 0.30)"
    strong:  "0 0 20px rgba(140, 123, 255, 0.45), 0 0 40px rgba(140, 123, 255, 0.15)"
    intense: "0 0 30px rgba(140, 123, 255, 0.55), 0 0 60px rgba(140, 123, 255, 0.20), 0 0 100px rgba(140, 123, 255, 0.08)"

  sky:
    subtle:  "0 0 6px rgba(82, 199, 255, 0.15)"
    default: "0 0 12px rgba(82, 199, 255, 0.30)"
    strong:  "0 0 20px rgba(82, 199, 255, 0.45), 0 0 40px rgba(82, 199, 255, 0.15)"
    intense: "0 0 30px rgba(82, 199, 255, 0.55), 0 0 60px rgba(82, 199, 255, 0.20), 0 0 100px rgba(82, 199, 255, 0.08)"

  amber:
    subtle:  "0 0 6px rgba(210, 179, 94, 0.15)"
    default: "0 0 12px rgba(210, 179, 94, 0.30)"
    strong:  "0 0 20px rgba(210, 179, 94, 0.45), 0 0 40px rgba(210, 179, 94, 0.15)"
    intense: "0 0 30px rgba(210, 179, 94, 0.55), 0 0 60px rgba(210, 179, 94, 0.20), 0 0 100px rgba(210, 179, 94, 0.08)"

  success:
    subtle:  "0 0 6px rgba(74, 222, 128, 0.15)"
    default: "0 0 12px rgba(74, 222, 128, 0.30)"

  error:
    subtle:  "0 0 6px rgba(248, 113, 113, 0.15)"
    default: "0 0 12px rgba(248, 113, 113, 0.30)"

  # Composite: glow + shadow combined for elevated-glow cards
  composite:
    violet_card: "0 2px 4px -1px rgba(0,0,0,0.45), 0 0 20px rgba(140,123,255,0.25)"
    sky_card:    "0 2px 4px -1px rgba(0,0,0,0.45), 0 0 20px rgba(82,199,255,0.25)"
    amber_card:  "0 2px 4px -1px rgba(0,0,0,0.45), 0 0 20px rgba(210,179,94,0.25)"

  # Border-glow (used for focus rings and arcane borders)
  border:
    violet: "inset 0 0 0 1px rgba(140, 123, 255, 0.30), 0 0 12px rgba(140, 123, 255, 0.20)"
    sky:    "inset 0 0 0 1px rgba(82, 199, 255, 0.30), 0 0 12px rgba(82, 199, 255, 0.20)"
    amber:  "inset 0 0 0 1px rgba(210, 179, 94, 0.30), 0 0 12px rgba(210, 179, 94, 0.20)"

# ─────────────────────────────────────────────────────────────────────────────
# ANIMATION — Timing, easing, motion language
# ─────────────────────────────────────────────────────────────────────────────
animation:
  duration:
    instant:  "50ms"
    fast:     "100ms"
    normal:   "200ms"
    slow:     "350ms"
    glacial:  "600ms"
    cinematic: "1000ms"

  easing:
    default:    "cubic-bezier(0.4, 0.0, 0.2, 1)"      # Material standard
    decelerate: "cubic-bezier(0.0, 0.0, 0.2, 1)"      # entering
    accelerate: "cubic-bezier(0.4, 0.0, 1, 1)"        # leaving
    sharp:      "cubic-bezier(0.4, 0.0, 0.6, 1)"      # utility
    spring:     "cubic-bezier(0.34, 1.56, 0.64, 1)"   # bouncy, for attention
    arcane:     "cubic-bezier(0.22, 0.68, 0.0, 1.04)"  # mystical overshoot

  # Named transitions (property, duration, easing)
  transitions:
    color:      "color 200ms cubic-bezier(0.4, 0.0, 0.2, 1)"
    background: "background-color 200ms cubic-bezier(0.4, 0.0, 0.2, 1)"
    shadow:     "box-shadow 350ms cubic-bezier(0.4, 0.0, 0.2, 1)"
    transform:  "transform 200ms cubic-bezier(0.4, 0.0, 0.2, 1)"
    opacity:    "opacity 200ms cubic-bezier(0.4, 0.0, 0.2, 1)"
    border:     "border-color 200ms cubic-bezier(0.4, 0.0, 0.2, 1)"
    all_fast:   "all 100ms cubic-bezier(0.4, 0.0, 0.2, 1)"
    all_normal: "all 200ms cubic-bezier(0.4, 0.0, 0.2, 1)"
    glow_pulse: "box-shadow 1000ms cubic-bezier(0.22, 0.68, 0.0, 1.04)"

  # Keyframe definitions (for CSS @keyframes / Compose animation specs)
  keyframes:
    pulse_glow:
      "0%":   { opacity: 0.6 }
      "50%":  { opacity: 1.0 }
      "100%": { opacity: 0.6 }
    fade_in:
      "0%":   { opacity: 0 }
      "100%": { opacity: 1 }
    slide_up:
      "0%":   { opacity: 0, transform: "translateY(8px)" }
      "100%": { opacity: 1, transform: "translateY(0)" }
    arcane_shimmer:
      "0%":   { background_position: "-200% center" }
      "100%": { background_position: "200% center" }

# ─────────────────────────────────────────────────────────────────────────────
# GRADIENTS — Named gradient definitions
# ─────────────────────────────────────────────────────────────────────────────
gradient:
  # Linear gradients for surfaces
  void_depth:      "linear-gradient(180deg, #0D0D0F 0%, #080808 100%)"
  violet_fade:     "linear-gradient(135deg, rgba(140,123,255,0.12) 0%, transparent 60%)"
  sky_fade:        "linear-gradient(135deg, rgba(82,199,255,0.10) 0%, transparent 60%)"
  amber_fade:      "linear-gradient(135deg, rgba(210,179,94,0.10) 0%, transparent 60%)"

  # Hero / landing page gradients
  hero_radial:     "radial-gradient(ellipse at 50% 0%, rgba(140,123,255,0.15) 0%, rgba(82,199,255,0.05) 40%, transparent 70%)"
  hero_mesh:       "radial-gradient(at 20% 30%, rgba(140,123,255,0.12) 0%, transparent 50%), radial-gradient(at 80% 60%, rgba(82,199,255,0.08) 0%, transparent 50%), radial-gradient(at 50% 80%, rgba(210,179,94,0.06) 0%, transparent 50%)"

  # Shimmer for loading states
  arcane_shimmer:  "linear-gradient(90deg, transparent 0%, rgba(140,123,255,0.08) 25%, rgba(82,199,255,0.08) 50%, rgba(140,123,255,0.08) 75%, transparent 100%)"

  # Keyboard-specific
  key_pressed:     "linear-gradient(180deg, #16161A 0%, #111114 100%)"
  key_surface:     "linear-gradient(180deg, #1C1C22 0%, #16161A 100%)"

# ─────────────────────────────────────────────────────────────────────────────
# COMPONENT TOKENS — Pre-composed per-component settings
# ─────────────────────────────────────────────────────────────────────────────
component:
  button:
    height:
      sm: "28px"
      md: "36px"
      lg: "44px"
    padding_h:
      sm: "12px"
      md: "16px"
      lg: "24px"
    radius: "{radius.button}"
    font_size:
      sm: "{typography.scale.xs.size}"
      md: "{typography.scale.sm.size}"
      lg: "{typography.scale.base.size}"
    font_weight: "{typography.weight.semibold}"
    icon_size:
      sm: "14px"
      md: "16px"
      lg: "20px"
    icon_gap: "6px"

  card:
    radius: "{radius.card}"
    padding: "{spacing.card_padding}"
    gap: "{spacing.card_gap}"
    border_width: "1px"
    min_width: "200px"

  input:
    height: "36px"
    padding_h: "12px"
    radius: "{radius.input}"
    font_size: "{typography.scale.base.size}"
    border_width: "1px"

  badge:
    height: "20px"
    padding_h: "8px"
    radius: "{radius.badge}"
    font_size: "{typography.scale.2xs.size}"
    font_weight: "{typography.weight.bold}"

  tooltip:
    radius: "{radius.tooltip}"
    padding: "6px 10px"
    font_size: "{typography.scale.xs.size}"
    max_width: "240px"

  modal:
    radius: "{radius.modal}"
    padding: "24px"
    max_width: "560px"
    backdrop: "{color.semantic.surface.scrim}"

  # Dashboard-specific
  metric_card:
    min_height: "120px"
    label_size: "{typography.scale.xs.size}"
    value_size: "{typography.scale.2xl.size}"
    delta_size: "{typography.scale.sm.size}"

  # Keyboard-specific
  key:
    radius: "{radius.key}"
    gap: "{spacing.key_gap}"
    padding_h: "{spacing.key_padding_h}"
    padding_v: "{spacing.key_padding_v}"
    height:
      default: "42dp"
      space: "42dp"
      enter: "84dp"
    font_size:
      alpha: "18sp"
      symbol: "14sp"
      function: "12sp"

# ─────────────────────────────────────────────────────────────────────────────
# BREAKPOINTS — Responsive (used by CSS and Compose)
# ─────────────────────────────────────────────────────────────────────────────
breakpoint:
  xs: "0px"
  sm: "480px"
  md: "768px"
  lg: "1024px"
  xl: "1280px"
  "2xl": "1536px"

# ─────────────────────────────────────────────────────────────────────────────
# Z-INDEX — Layering
# ─────────────────────────────────────────────────────────────────────────────
z_index:
  base:     0
  raised:   10
  dropdown: 100
  sticky:   200
  overlay:  300
  modal:    400
  popover:  500
  toast:    600
  tooltip:  700
  max:      9999
