# Claude_Vault — Operational Configuration
# This file is read by custom plugins and by AI agents at session start.
# Last architecture correction: 2026-04-19 — see decisions/DEC-0003.md

vault:
  name: "Claude_Vault"
  version: "0.2.0"
  owner: "ai"  # not a human vault
  path: "C:\\Users\\MarsBase\\Documents\\Claude_Vault"
  role: "ai_operational_layer"   # decisions, knowledge, sessions, tasks for AI agents

# 4-vault ecosystem — each has its own path, own repo, own role
ecosystem:
  claude_vault:
    path: "C:\\Users\\MarsBase\\Documents\\Claude_Vault"
    role: "AI operational layer (this vault)"
    repo: "github.com/Gsunny45/Claude_Vault"
  command_vault:
    path: "C:\\Users\\MarsBase\\Documents\\Command_Vault"
    role: "monitoring / observability — reads all vaults, emits health + alerts"
    repo: "TBD — own repo required"
  local_network_hub:
    path: "C:\\Users\\MarsBase\\Documents\\Local-Network-Hub"
    role: "orchestration — REST API, webhooks, routes work between vaults and agents"
    repo: "TBD — own repo required"
  rag_vault:
    path: "C:\\Users\\MarsBase\\Documents\\RAG_Vault"
    role: "knowledge retrieval — corpus for agent RAG (replaces FM v1's intended role)"
    repo: "TBD — own repo required"

# Explicitly NOT part of the active system
not_in_system:
  - name: "Force Multiplication v1"
    path: "C:\\Users\\MarsBase\\Documents\\Force Multiplication v1"
    status: "legacy human knowledge base — read-only reference, do not index"
  - name: "android-ai-keyboard-harness (injection keyboard)"
    path: "C:\\Users\\MarsBase\\Documents\\android-ai-keyboard-harness"
    status: "ACTIVE project, un-iceboxed 2026-05-28 (DEC-0004), go-live 2026-05-29 (DEC-0005). Own repo, non-vault folder. agentA-Z path never scaffolded."

# Paths excluded from ALL scans (context-compiler, drift-detector, exporter)
scan_excludes:
  - "node_modules"
  - "llm-orchestrator"          # EXTRACTED 2026-05-29 (no longer nested); kept as defensive exclude
  - "Claude_on_Claude"          # EXTRACTED 2026-05-29 (no longer nested); kept as defensive exclude
  - "n8n-workflows"             # RESOLVED 2026-05-29: canonical copy in Local-Network-Hub; vault dup archived. Exclude kept as defensive guard.
  - ".obsidian"
  - ".smart-env"
  - ".git"
  - ".claude"
  - "assets"
  - "C:\\Users\\MarsBase\\Documents\\Claude_Vault"   # literal-path ghost dir (vault_monitor.py bug)

context_compiler:
  token_budget: 8000          # max tokens for a briefing packet
  priority_weights:
    recency: 0.3              # how recently the note was modified
    change_delta: 0.3         # how much changed since last session
    link_centrality: 0.2      # how connected the note is
    declared_importance: 0.2  # explicit priority tag
  briefing_output: "_system/_briefing.md"
  stale_threshold_days: 7     # flag notes not verified in this window
  # Plugins should read top-level scan_excludes

decision_ledger:
  id_prefix: "DEC"
  auto_increment: true
  require_alternatives: true  # every decision must list at least one alternative
  require_rationale: true

drift_detector:
  scan_interval: "on_open"    # run when vault opens
  output: "_system/_drift_report.md"
  severity_levels:
    - contradiction           # two notes make incompatible claims
    - stale_reference         # note links to something that changed
    - orphan                  # note has no inbound links and no recent access
    - schema_violation        # note doesn't match _schemas.yaml

session:
  id_format: "SES-{date}-{seq}"
  auto_close_after_hours: 4
  log_files_accessed: true

# Training-data preservation — do NOT prune these paths without confirmation
training_data_preserved:
  - "_system/logs/"
  - "llm-orchestrator/training_data/"
  - "sessions/"
  - "inbox/"
