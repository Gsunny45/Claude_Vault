version: "3.8"

# Vault monitoring stack — Prometheus + Grafana
# Run: docker-compose up -d
# Or on WSL/Kali: docker compose up -d
#
# Vault exporter runs on host: python vault_exporter.py
# Prometheus scrapes localhost:9090/metrics
# Grafana dashboard at http://localhost:3000 (admin/admin)

services:
  prometheus:
    image: prom/prometheus:latest
    container_name: vault-prometheus
    restart: unless-stopped
    ports:
      - "9091:9090"
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    extra_hosts:
      - "host.docker.internal:host-gateway"
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.retention.time=90d"
      - "--web.enable-lifecycle"

  grafana:
    image: grafana/grafana:latest
    container_name: vault-grafana
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=vaultops
      - GF_USERS_ALLOW_SIGN_UP=false
      - GF_DASHBOARDS_DEFAULT_HOME_DASHBOARD_PATH=/var/lib/grafana/dashboards/vault-ops.json
    volumes:
      - grafana_data:/var/lib/grafana
      - ./grafana_dashboard.json:/var/lib/grafana/dashboards/vault-ops.json:ro
      - ./grafana_datasource.yml:/etc/grafana/provisioning/datasources/prometheus.yml:ro
      - ./grafana_dashboard_provider.yml:/etc/grafana/provisioning/dashboards/default.yml:ro

volumes:
  prometheus_data:
  grafana_data:
